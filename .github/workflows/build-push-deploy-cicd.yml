name: Build, push to ECR, and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: alxphelps/portfolio
  SSM_TARGET_TAG_KEY: Project
  SSM_TARGET_TAG_VALUE: portfolio

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::342989859526:role/portfolio-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Set image URI for deploy
        id: meta
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::342989859526:role/portfolio-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM (docker compose on EC2)
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image }}
        run: |
          set -euo pipefail

          DEPLOY_SCRIPT="$(sed \
            -e "s|__IMAGE_URI__|${IMAGE_URI}|g" \
            -e "s|__AWS_REGION__|${AWS_REGION}|g" \
            deploy/ssm-deploy.sh)"

          PARAMS="$(printf '%s\n' "$DEPLOY_SCRIPT" | jq -Rs 'split("\n") | map(select(length > 0)) | {commands: .}')"

          echo "Sending SSM command to tag:${SSM_TARGET_TAG_KEY}=${SSM_TARGET_TAG_VALUE}..."
          COMMAND_ID="$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "AWS-RunShellScript" \
            --comment "portfolio deploy ${GITHUB_SHA}" \
            --timeout-seconds 600 \
            --targets "Key=tag:${SSM_TARGET_TAG_KEY},Values=${SSM_TARGET_TAG_VALUE}" \
            --parameters "${PARAMS}" \
            --query "Command.CommandId" \
            --output text)"

          echo "Command ID: ${COMMAND_ID}"

          INSTANCE_IDS=""
          for _ in $(seq 1 30); do
            INSTANCE_IDS="$(aws ssm list-command-invocations \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --details \
              --query "CommandInvocations[*].InstanceId" \
              --output text)"
            if [ -n "${INSTANCE_IDS}" ] && [ "${INSTANCE_IDS}" != "None" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "No instances matched tag:${SSM_TARGET_TAG_KEY}=${SSM_TARGET_TAG_VALUE}. Is SSM online?"
            exit 1
          fi

          FAILED=0
          for INSTANCE_ID in ${INSTANCE_IDS}; do
            echo "Waiting for ${INSTANCE_ID}..."
            aws ssm wait command-executed \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" || true

            STATUS="$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text)"

            echo "--- ${INSTANCE_ID}: ${STATUS} ---"
            aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "StandardOutputContent" \
              --output text || true

            if [ "${STATUS}" != "Success" ]; then
              echo "stderr:"
              aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardErrorContent" \
                --output text || true
              FAILED=1
            fi
          done

          if [ "${FAILED}" -ne 0 ]; then
            exit 1
          fi

          echo "Deploy succeeded on all instance(s)."
